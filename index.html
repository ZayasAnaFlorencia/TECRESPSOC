<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MUSEO DEL TIEMPO // ARCHIVO HISTÓRICO v4.2</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#00ff41;
  --amber:#ffb000;
  --dark-green:#003b00;
  --bg:#020a02;
  --dim:#007a1f;
  --red:#ff2a2a;
  --cyan:#00fff5;
  --panel-bg:rgba(0,255,65,.04);
  --border:rgba(0,255,65,.3);
  --amber-border:rgba(255,176,0,.3);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--green);
  font-family:'Share Tech Mono',monospace;cursor:default;}
 
/* ── CRT ── */
body::before{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);
  pointer-events:none;z-index:9998;}
body::after{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.75) 100%);
  pointer-events:none;z-index:9997;}
 
/* ── SCANLINE SWEEP ── */
#scanline{position:fixed;width:100%;height:40px;
  background:linear-gradient(transparent,rgba(0,255,65,.06),transparent);
  pointer-events:none;z-index:9999;animation:sweep 6s linear infinite;}
@keyframes sweep{0%{top:-40px}100%{top:100vh}}
 
/* ── GRID BG ── */
#gridbg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,255,65,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,65,.025) 1px,transparent 1px);
  background-size:40px 40px;}
 
/* ── MATRIX ── */
#matrix{position:fixed;inset:0;z-index:0;opacity:.06;pointer-events:none;
  font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);overflow:hidden;}
 
/* ── CORNERS ── */
.corner{position:fixed;width:40px;height:40px;border-color:var(--dim);border-style:solid;z-index:5;}
.tl{top:12px;left:12px;border-width:1px 0 0 1px}
.tr{top:12px;right:12px;border-width:1px 1px 0 0}
.bl{bottom:12px;left:12px;border-width:0 0 1px 1px}
.br{bottom:12px;right:12px;border-width:0 1px 1px 0}
#sysclock{position:fixed;top:16px;right:55px;font-size:10px;color:var(--dim);z-index:6;}
#sysnode{position:fixed;bottom:16px;left:55px;font-size:9px;color:var(--dim);z-index:6;}
 
/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}
#s-char,#s-sala,#s-timeline,#s-archive{overflow-y:auto;justify-content:flex-start;}
 
/* ── ANIMATIONS ── */
@keyframes glitch{
  0%,100%{text-shadow:none;transform:translate(0)}
  20%{text-shadow:-2px 0 var(--red),2px 0 var(--cyan);transform:translate(-1px,1px)}
  40%{text-shadow:2px 0 var(--red),-2px 0 var(--cyan);transform:translate(1px,-1px)}
  80%{text-shadow:-1px 0 var(--cyan);transform:translate(1px,0)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--green)}50%{box-shadow:0 0 24px var(--green),0 0 48px var(--green)}}
@keyframes flicker{0%,100%{opacity:1}93%{opacity:.4}94%{opacity:1}96%{opacity:.8}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
 
.glitch{animation:glitch 4s infinite;font-family:'VT323',monospace;}
.blink{animation:blink 1s infinite;}
.flicker{animation:flicker 6s infinite;}
 
/* ── SHARED COMPONENTS ── */
.px-panel{
  background:var(--panel-bg);border:1px solid var(--border);
  position:relative;
}
.px-panel[data-label]::before{
  content:attr(data-label);position:absolute;top:-10px;left:14px;
  background:var(--bg);padding:0 8px;font-size:10px;
  color:var(--amber);letter-spacing:3px;
}
.px-title{
  font-family:'VT323',monospace;font-size:42px;color:var(--green);
  letter-spacing:4px;animation:glitch 5s infinite,flicker 7s infinite;
  text-align:center;
}
 
/* ── RETRO BUTTON ── */
.btn{
  background:transparent;border:1px solid var(--green);color:var(--green);
  font-family:'Share Tech Mono',monospace;font-size:12px;padding:12px 20px;
  cursor:pointer;letter-spacing:2px;text-transform:uppercase;
  position:relative;overflow:hidden;transition:color .15s,box-shadow .15s;
  text-align:left;
}
.btn:hover{color:var(--bg);box-shadow:0 0 18px var(--green);}
.btn:hover::before{left:0;}
.btn.amber{border-color:var(--amber);color:var(--amber);}
.btn.danger{border-color:var(--red);color:var(--red);}
 
/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;height:46px;z-index:50;
  background:#000;border-bottom:1px solid var(--green);
  display:none;align-items:center;padding:0 14px;gap:14px;
  font-size:10px;
}
#hud.active{display:flex;}
 
/* ── NPC DIALOG ── */
#npc{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:rgba(2,10,2,.97);border-top:1px solid var(--green);
  padding:12px 16px;display:none;animation:slideUp .25s ease;
}
#npc.active{display:block;}

/* ... Resto de los estilos originales ... */
</style>
</head>
<body>
<div id="scanline"></div>
<div id="gridbg"></div>
<div id="matrix"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="sysclock"></div>
<div id="sysnode">LAT:-27.3671 // LON:-55.8974 // NODO:ARCHIVO_v4.2</div>
<div id="toast"></div>
 
<div id="hud">
  <div class="hud-avatar" id="hud-avatar-glyph" style="display:flex;align-items:center;justify-content:center;font-size:18px;"></div>
  <span id="hud-name">---</span>
  <span id="hud-era" style="margin-left:auto">MUSEO DEL TIEMPO</span>
  <span id="hud-score">★ 0 PTS</span>
  <span id="hud-lives">♥ ♥ ♥</span>
</div>
 
<div id="npc">
  <div class="npc-inner">
    <div class="npc-face">⬩</div>
    <div class="npc-body">
      <div class="npc-tag">SISTEMA_CRONOS</div>
      <div id="npc-msg"></div>
      <div class="npc-actions" id="npc-btns"></div>
    </div>
  </div>
</div>

<div id="s-boot" class="screen active">
  <div class="px-panel" data-label="BOOT_SEQUENCE" style="width:400px;padding:30px;text-align:center;">
    <div class="px-title glitch">MUSEO DEL TIEMPO</div>
    <div style="margin:20px 0;font-size:10px;color:var(--dim);">ACCEDIENDO A ARCHIVOS TEMPORALES...</div>
    <button class="btn amber full" onclick="startGame()">INICIAR SISTEMA</button>
  </div>
</div>

<div id="s-char" class="screen"></div>
<div id="s-sala" class="screen"></div>
<div id="s-trivia" class="screen"></div>
<div id="s-trans" class="screen"></div>
